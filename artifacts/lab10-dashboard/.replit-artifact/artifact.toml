kind = "data-app"
previewPath = "/"
title = "LAB10 10x Builders Dashboard"
version = "1.0.0"
id = "artifacts/lab10-dashboard"
router = "path"

[[integratedSkills]]
name = "data-visualization"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24903

[services.development]
run = "pnpm --filter @workspace/lab10-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lab10-dashboard", "run", "build" ]
publicDir = "artifacts/lab10-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24903"
BASE_PATH = "/"
